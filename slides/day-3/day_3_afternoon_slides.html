# Cleaning for<br>Visualisation

Note:
"This morning we combined datasets on a map. This afternoon we look at the data itself, clean it, and build a visualisation page. Without clean data, the visualisations will be wrong."

---

## The goal

By the end of this afternoon:

- Clean the FloodArchive data in Google Sheets
- Build a **visualisation page** with charts that slice the data in different ways
- Publish it on GitHub Pages as a **separate page** from your map

Tomorrow we will connect everything with a landing page.

Note:
Set the goal upfront so students know why they're cleaning. The visualisation page won't work with messy data: country name variants split bar charts, inconsistent causes produce dozens of tiny slices instead of clear categories.

---

## Why cleaning matters

You want to build charts like:

- Flood events **by country** (top 20)
- Flood events **per year** (trend over time)
- Breakdown **by cause**
- Total displaced **by severity**

But with the current data:

- "Philippines" is spelled 5 different ways → 5 bars instead of 1
- "Heavy rain" has 9 variants → 9 slices instead of 1
- Dead = 0 could mean zero or unknown → totals are unreliable

**Clean first. Visualise second.**

Note:
Make the connection concrete. Show that the messiness directly breaks the charts they want to build. This motivates the cleaning work.

---

## The FloodArchive: what's actually in it?

We have been using this data all week. Let's look at it properly.

Open the FloodArchive CSV in **Google Sheets**:

1. Go to Google Sheets → File → Import → Upload
2. Upload `FloodArchive_clustered.csv`
3. Choose "Comma" as separator

Now we can see every row and every column. This is what the AI has been working with.

Note:
Walk through the import live. Make sure everyone has it open. This is the first time many students are looking at the raw data instead of the map.

---

## What does messy data look like?

Let's explore. In Google Sheets, try these:

- **Sort by Country** (Data → Sort sheet → Column C). Scroll through. Notice anything?
- **Sort by MainCause**. How many ways is "Heavy rain" spelled?
- **Filter Dead = 0**. Does 0 mean zero people died, or unknown?

Take 5 minutes to explore. Write down what you find.

Note:
Give students 5 minutes to explore freely. Then collect findings on the whiteboard. They will find: country name variants, case inconsistencies, trailing spaces, typos, ambiguous zeros.

---

## Country name problems

<div class="compact">

| In the data | Should be |
|---|---|
| Phillipines, Philipines, Philippine | Philippines |
| Philippines (with trailing space) | Philippines |
| DR Congo, Democratic Republic Congo, Democratic Republic of the Congo | Pick one, use it everywhere |
| USA, USA., USA (trailing space) | USA |
| UK, UK (trailing space) | UK |

</div>

A computer treats "Philippines" and "Philippines " as two different countries. So does a filter. So does a chart.

Note:
Project this slide and have students look for these in their own spreadsheet. The trailing spaces are the sneakiest: they are invisible but break every filter and lookup.

---

## MainCause problems

<div class="compact">

| In the data | Count | Problem |
|---|---|---|
| Heavy rain | 2,131 | |
| Heavy Rain | 893 | Different capitalisation |
| heavy rain | 4 | Different capitalisation |
| Heavy  Rain | 2 | Double space |
| HeavyRain | 1 | Missing space |
| Heay Rain | 1 | Typo |
| Heavy RAin | 2 | Typo |
| 0 | 11 | Missing value coded as zero |
| (blank) | 3 | Actually missing |

</div>

Nine representations of the same cause. A bar chart will show nine categories instead of one.

Note:
This is the slide that makes the problem visceral. Nine ways to say "heavy rain." If you count by MainCause without cleaning, you get nine categories instead of one.

---

## Validation field problems

The Validation column records the source that confirmed the flood event.

| In the data | Count |
|---|---|
| FloodList | 502 |
| FloodLIst | 38 |
| Flood List | 8 |
| Flood LIst | 1 |

Four versions of the same source. And 188 entries have "0" as validation, meaning: unvalidated.

Note:
Another concrete example. The same pattern as country names and MainCause: inconsistent naming, typos, trailing spaces, and coded missing values.

---

## The ambiguity of zero

In this dataset, **0 does not always mean zero**:

- `Dead = 0` for 1,554 events (30%). Did nobody die, or is the number unknown?
- `Displaced = 0` for 1,525 events (30%). Same question.
- `GlideNumber = 0` for 4,652 events (91%). This is a missing ID, not a zero.

**You have to decide** what 0 means in each column and document your decision. The data will not tell you.

Note:
This is the verify step applied to individual values. The distinction between "zero" and "unknown" is critical for any analysis. If you count total deaths and include the zeros as actual zeros, your total is wrong. If you exclude them, your count of events is wrong. Either way you need to document what you chose.

# Cleaning in<br>Google Sheets

Note:
"Now let's fix some of these problems. Google Sheets is the right tool for this: you can see everything, and your colleague can too."

---

## Why Google Sheets for cleaning?

- You can **see** every value and every change
- Your colleague can see it too (shared spreadsheet)
- Formulas are visible in the cell (traceability)
- No code to review or debug

For small-to-medium datasets (under ~50,000 rows), a spreadsheet is often the most transparent cleaning tool.

Note:
This is the traceability argument from Lecture 4. A formula in a cell is more transparent than a Python script for non-technical stakeholders. For larger datasets you need OpenRefine or scripts, but for this exercise Google Sheets is the right choice.

---

## Getting data into Google Sheets

Two ways to import data:

**Upload:** File → Import → Upload your CSV. Choose the right separator (comma, semicolon, or tab).

**IMPORTDATA formula:** pull data directly from a URL:

```
=IMPORTDATA("https://raw.githubusercontent.com/user/repo/main/data.csv")
```

After importing with a formula, **detach the data** so you can edit it: select all → Copy → Edit → Paste special → **Values only**. Now the cells contain values, not formulas.

Note:
IMPORTDATA is useful for connecting Google Sheets to data in a GitHub repo. But you can't edit formula-generated cells, so paste-as-values is essential before cleaning. Note that CSVs can use different separators: commas, semicolons, or tabs (TSV). Google Sheets asks which one to use during import.

---

## Useful Google Sheets functions

| Function | What it does | Example |
|---|---|---|
| `LEFT(A2, 4)` | Extract characters from the left | Extract year from "1985-01-01" |
| `TRIM(A2)` | Remove leading/trailing spaces | Fix "Philippines " |
| `UPPER(A2)` / `LOWER(A2)` | Change case | Standardise text |
| `SUBSTITUTE(A2, "old", "new")` | Replace text within a cell | Fix specific values |
| `COUNTIF(A:A, "value")` | Count matching cells | How many "Philippines"? |

You do not need to memorise these. Ask your AI chatbot: "what Google Sheets formula would do X?"

Note:
Quick reference. The LEFT function is particularly useful for extracting years from date strings like "1985-01-01". COUNTIF helps verify cleaning: after standardising, count to check that variants are gone.

---

## Pivot tables for exploration

A pivot table **counts and summarises** data without changing it.

1. Select all your data
2. Insert → Pivot table → New sheet
3. Set **Rows** = what you want to group by (e.g., Country)
4. Set **Values** = what you want to count (e.g., COUNTA of ID)

Try: flood events **by year**. Use LEFT to extract the year from the Began column first, then pivot on that.

Add **conditional formatting** (Format → Conditional formatting → Colour scale) to spot patterns visually: where are the red spots?

Note:
Demo this live. Pivot tables are the perfect way to count floods by country or by year. Conditional formatting with a colour scale (white to red) makes patterns visible at a glance. A participant noted "it took me a while to figure out the logic of the pivot table" — so walk through it step by step.

---

## Technique 1: Filter and overwrite

Use column filters to isolate incorrect values, then fix them in bulk.

1. Select the column → Data → Create a filter
2. Click the filter dropdown → uncheck all → select only the wrong value (e.g., "Phillipines")
3. Now only the wrong rows are visible. Type the correct value in the first visible cell, then **copy it down** to all filtered rows.
4. Remove the filter. The corrected values are now in place alongside the rest.

This is more controlled than Find and Replace: you see exactly which rows you are changing.

Note:
Demo this live. Filter by "Phillipines", show the rows, paste "Philippines" over them. Then filter by "Philippines " (with trailing space) and fix those too. Students can verify the count before and after.

---

## Technique 2: handling invisible spaces

Trailing spaces are invisible but break everything.

Google Sheets may **suggest automated cleaning** (a small prompt appears when it detects trailing spaces). This catches spaces **after** the text but can miss spaces **before** it.

To catch both, use the `TRIM` formula in a helper column:

```
=TRIM(C2)
```

TRIM removes leading, trailing, and double spaces. Apply it to the column, then copy-paste **values only** to replace the originals.

**Always verify after cleaning**: filter by the original and trimmed values to confirm they now match.

Note:
Google Sheets' automated suggestion is helpful but incomplete. Demo both: accept the automated fix, then check if leading spaces were caught. If not, use TRIM. The verification step is key: don't assume the cleaning worked without checking.

---

## For larger datasets: OpenRefine

Google Sheets works for thousands of rows. For tens of thousands or more, **OpenRefine** is the tool.

- **Text facets**: see all unique values in a column instantly, click to filter
- **Clustering**: automatically group similar values and merge them
- **Timeline facets**: filter dates with a visual histogram
- **Trim whitespace**: one click to remove leading/trailing spaces

You don't need to memorise OpenRefine. Ask your AI chatbot: "remind me how to do clustering in OpenRefine" and it will walk you through it.

Note:
OpenRefine is free and open source. The practitioner makes the cleaning decisions; the AI helps with the tool mechanics.

---

## OpenRefine clustering algorithms

Different algorithms catch different problems. Try several.

- **Key collision**: catches exact duplicates (Brazil/Brasil)
- **Nearest neighbour**: catches near-matches (Phillipines/Philippines)
- **Phonetic** (metaphone): catches sound-alikes (Cote d'Ivoire variations)

OpenRefine can also **fetch URLs** to call APIs (e.g., REST Countries to get capital cities), parse JSON responses, and extract substrings using GREL formulas.

Note:
Demo the clustering live if time allows. Each algorithm surfaces different issues. Key collision is fastest and catches the obvious ones. Nearest neighbour is slower but catches typos. Phonetic catches names that sound alike but are spelled differently.

---

# Proposals:<br>What to Pitch

Note:
"Before we wrap up, a few words about how to pitch your proposal. This connects to everything we've been building."

---

## Don't pitch doing what they already do, but better

The worst pitch: "we will help you do what you already do, but with data."

The funder already has processes. They don't need someone to tell them to keep doing the same thing with a spreadsheet on top.

A strong pitch shows **new possibilities**: things they thought were impossible, or things they didn't know were possible.

Note:
This is the most common proposal mistake. Students will want to say "we'll improve your monitoring." Instead: "we'll show you which facilities are at risk BEFORE the next flood, something you currently cannot do." That's a new capability, not an incremental improvement.

---

## Find the most compelling point

Your proposal will have many ideas. Not all of them are equally compelling.

- **Keep data presentation simple.** The funder is not a data expert.
- **Embed evaluation** in the methodology, but don't make evaluation the pitch. Nobody gets excited about better evaluation.
- **The case study is your proof of capability.** "I'm showing you that I can do the work."
- It's not about these specific numbers. It's an example of how you would use data to support decisions.

Note:
Simplicity matters. The proposal is still a pitch. Everything supports the argument "this is what I can do for you." The case study demonstrates credibility. The data is evidence. The visualisations make the evidence accessible.

---

## Show new capabilities

Many organisations already collect data but don't know what to do with it.

Your proposal should show: **with the data you already gather, here is what becomes possible.**

- A dashboard that turns routine data into situational awareness
- A map that connects data points no one had connected before
- An early warning system built from data they already have

How data gives the funder **opportunities to do things differently**.

Note:
This is the positive framing. The funder's problem is not lack of data — it's lack of capacity to use it. The proposal bridges that gap by showing concrete new capabilities.

---

# Tips and Q&A

Note:
"A few practical things that came up today."

---

## CSV is not always comma-separated

Although CSV stands for "comma-separated values," you may encounter:

- **Semicolon-separated** files (common in Europe, where commas are decimal separators)
- **Tab-separated** files (.tsv)

This is why Google Sheets asks you to choose the separator when importing. If your data looks wrong after import, try a different separator.

Note:
A quick gotcha that trips people up. If all the data appears in one column, the separator is wrong.

---

## Your Codespace is a rented computer

When your Codespace shuts off (it does this automatically to save resources):

- Your **files are preserved** (data, scripts, maps)
- Your **apps restart fresh** (Gemini CLI needs to be relaunched)

Think of it as: the data stays, the tools restart.

Note:
Students were confused by this. The Codespace preserves the filesystem but not running processes. Gemini CLI sessions are saved though, so gemini --resume still works.

---

## Controlling the AI's pace

If a task is complex, tell the AI to go **step by step** and explain each step before executing.

- Prevents the AI from interpreting your request in a way you don't want
- Makes it easier to go back if something is wrong
- Gives you context that helps you learn

Give the AI **context about what you're doing and why**. This forces it to think more carefully about its approach.

Note:
Step-by-step prompting is a form of guardrailing. When you ask the AI to explain its plan, you get a checkpoint before it acts. When you give context, you constrain the space of possible responses.

---

## Community data and empowerment

Several of you are working on proposals involving community-based data practices.

A key framing: the goal is not to teach the community new things. It is to help them **demonstrate that what they already know and do is powerful**.

- Surface existing knowledge and practices
- Use data to highlight impact that is already happening
- Empower the community to advocate with evidence from their own experience

Note:
This came up from participants working on indigenous knowledge and climate resilience. The data project's role is to make existing community knowledge visible and defensible, not to impose external frameworks.

<script>
/**
 * <cli-csv> — Hand-drawn CSV file diagram with cropped-document feel.
 *
 * Renders tabular data as a sketched spreadsheet with wobbly hand-drawn
 * grid lines and crisp text. The top shows a file tab; the bottom fades
 * out with a gradient mask, suggesting the data continues beyond view.
 *
 * Usage in markdown:
 *   <cli-csv file="commitments.csv" wrap="1,5">
 *     id, commitment, actor, amount, timeline, quote
 *     1, Infrastructure programme, Gov of SA, R1 trillion, 3 years, "invest over R1 trillion…"
 *   </cli-csv>
 *
 * Attributes:
 *   file  — optional filename label shown in the file tab (gray, monospace)
 *   wrap  — comma-separated column indices (0-based) that wrap text instead
 *           of clipping with ellipsis. Wrapped columns grow row height to fit.
 *           Omitted = all columns clip.
 *
 * Text content:
 *   One line per row, comma-separated. First line becomes the header row.
 *   Supports basic quoted strings (commas inside quotes are preserved).
 */
class CliCsv extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['file', 'wrap'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _parseLine(line) {
    const cells = [];
    let current = '';
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; current += ch; }
      else if (ch === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cells.push(current.trim());
    return cells;
  }

  // Seeded pseudo-random for consistent wobble across renders
  _srand(seed, i) {
    const x = Math.sin(seed * 127.1 + i * 311.7) * 43758.5453;
    return (x - Math.floor(x)) * 2 - 1; // -1 to 1
  }

  // Draw a wobbly line as an SVG path with quadratic bezier segments
  _wobbleLine(x1, y1, x2, y2, seed, wobbleAmt) {
    const segments = 5;
    const dx = (x2 - x1) / segments;
    const dy = (y2 - y1) / segments;
    const w = wobbleAmt || 4;

    let d = `M${x1.toFixed(1)},${y1.toFixed(1)}`;
    for (let i = 1; i <= segments; i++) {
      const endX = x1 + dx * i + (i < segments ? this._srand(seed, i) * w * 0.3 : 0);
      const endY = y1 + dy * i + (i < segments ? this._srand(seed, i + 50) * w * 0.3 : 0);
      const cpX = x1 + dx * (i - 0.5) + this._srand(seed, i + 100) * w;
      const cpY = y1 + dy * (i - 0.5) + this._srand(seed, i + 150) * w;
      d += ` Q${cpX.toFixed(1)},${cpY.toFixed(1)} ${endX.toFixed(1)},${endY.toFixed(1)}`;
    }
    return d;
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const lines = raw.split('\n').map(s => s.trim()).filter(Boolean);
    const rows = lines.map(line => this._parseLine(line));
    const numCols = Math.max(...rows.map(r => r.length));
    const numRows = rows.length;

    const filename = this.getAttribute('file') || '';
    const seed = 42; // fixed seed for consistent wobble

    // Parse wrap attribute: comma-separated 0-based column indices
    const wrapAttr = this.getAttribute('wrap') || '';
    const wrapCols = new Set(wrapAttr.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)));

    // Column widths: proportional to max content, with minimum for headers
    const colMaxChars = [];
    for (let c = 0; c < numCols; c++) {
      let max = 0;
      for (const row of rows) {
        const len = (row[c] || '').length;
        if (len > max) max = len;
      }
      colMaxChars.push(Math.max(max, 4));
    }
    const paddedChars = colMaxChars.map(c => c + 3);
    const totalChars = paddedChars.reduce((a, b) => a + b, 0);

    // Layout — generous sizing for slide readability
    const cellPadX = 18;
    const baseCellH = 58;
    const fileTabH = 44;
    const fadeH = 36;
    const insetX = 8;       // horizontal inset so wobble on left/right borders stays visible
    const gridW = Math.max(800, totalChars * 13);
    const totalW = gridW + insetX * 2;
    const colWidths = paddedChars.map(c => (c / totalChars) * gridW);
    const gridTop = fileTabH;

    // Estimate row heights — wrapped columns may need taller rows
    // approx chars per line = (colWidth - 2*cellPadX) / 10 (rough char width at 16pt mono)
    const rowHeights = [];
    for (let r = 0; r < numRows; r++) {
      let maxH = baseCellH;
      for (let c = 0; c < numCols; c++) {
        if (!wrapCols.has(c)) continue;
        const text = rows[r][c] || '';
        const availW = colWidths[c] - 2 * cellPadX;
        const charsPerLine = Math.max(1, Math.floor(availW / 10));
        const lineCount = Math.ceil(text.length / charsPerLine);
        if (lineCount > 1) {
          const neededH = lineCount * 26 + 20; // 26px per line + padding
          if (neededH > maxH) maxH = neededH;
        }
      }
      rowHeights.push(maxH);
    }

    // Cumulative Y offsets for each row
    const rowY = [gridTop];
    for (let r = 0; r < numRows; r++) {
      rowY.push(rowY[r] + rowHeights[r]);
    }
    const gridH = rowY[numRows] - gridTop;
    const totalH = gridTop + gridH + fadeH;

    // --- SVG wobbly grid lines ---
    let paths = '';
    const thin = 1.5;
    const thick = 2.5;

    const gL = insetX;           // grid left edge
    const gR = insetX + gridW;   // grid right edge

    // Top border
    paths += `<path d="${this._wobbleLine(gL, gridTop, gR, gridTop, seed + 1, 5)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Header separator
    const hSepY = rowY[1];
    paths += `<path d="${this._wobbleLine(gL, hSepY, gR, hSepY, seed + 2, 5)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Internal horizontal lines
    for (let r = 2; r <= numRows; r++) {
      const y = rowY[r];
      paths += `<path d="${this._wobbleLine(gL + 2, y, gR - 2, y, seed + r + 10, 4)}"
        fill="none" stroke="#091A31" stroke-width="${thin}" opacity="0.4"/>`;
    }

    // Left border
    paths += `<path d="${this._wobbleLine(gL + 1, gridTop, gL + 1, gridTop + gridH + fadeH, seed + 100, 4)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Right border
    paths += `<path d="${this._wobbleLine(gR - 1, gridTop, gR - 1, gridTop + gridH + fadeH, seed + 101, 4)}"
      fill="none" stroke="#091A31" stroke-width="${thick}"/>`;

    // Internal vertical lines
    let x = gL;
    for (let c = 1; c < numCols; c++) {
      x += colWidths[c - 1];
      paths += `<path d="${this._wobbleLine(x, gridTop + 2, x, gridTop + gridH + fadeH, seed + c + 200, 3.5)}"
        fill="none" stroke="#091A31" stroke-width="${thin}" opacity="0.4"/>`;
    }

    // Header background (straight rect — wobble is on lines, not fills)
    const headerBg = `<rect x="${gL + 2}" y="${gridTop + 2}" width="${gridW - 4}" height="${rowHeights[0] - 3}"
      fill="#EBF6FF" rx="0"/>`;

    // --- Text cells (crisp, no filter) ---
    let cells = '';
    for (let r = 0; r < numRows; r++) {
      let cx = 0;
      for (let c = 0; c < numCols; c++) {
        const y = rowY[r];
        const h = rowHeights[r];
        const text = rows[r][c] || '';
        const isHeader = r === 0;
        const shouldWrap = wrapCols.has(c) && !isHeader;
        cells += `<div style="position:absolute; left:${cx + insetX}px; top:${y}px; width:${colWidths[c]}px; height:${h}px;
          display:flex; align-items:center; padding:0 ${cellPadX}px; box-sizing:border-box;
          font-family:'Roboto Mono',monospace; font-size:${isHeader ? '17pt' : '16pt'};
          font-weight:${isHeader ? '700' : '400'}; color:#091A31;
          overflow:hidden;${shouldWrap
            ? ' white-space:normal; word-break:break-word; line-height:1.4;'
            : ' white-space:nowrap; text-overflow:ellipsis;'}">${text}</div>`;
        cx += colWidths[c];
      }
    }

    // File tab label
    const fileLabel = filename
      ? `<div style="position:absolute; left:${insetX + 4}px; top:8px;
          font-family:'Roboto Mono',monospace; font-size:15pt; font-weight:600;
          color:#888; letter-spacing:0.02em;">${filename}</div>`
      : '';

    // Gradient mask: solid through data, fading at the bottom
    const solidPct = ((gridTop + gridH - fadeH) / totalH * 100).toFixed(0);

    // Wrap in a scaling container that shrinks the component to fit the slide
    const uid = Math.random().toString(36).slice(2, 8);
    const innerId = `csv-inner-${uid}`;
    const outerId = `csv-outer-${uid}`;

    this.innerHTML = `
      <div id="${outerId}" style="width:100%; margin:1em 0; overflow:visible;">
        <div id="${innerId}" style="position:relative; width:${totalW}px; height:${totalH}px;
          transform-origin:top left;
          -webkit-mask-image:linear-gradient(to bottom, black 0%, black ${solidPct}%, transparent 100%);
          mask-image:linear-gradient(to bottom, black 0%, black ${solidPct}%, transparent 100%);">
          <svg width="${totalW + 4}" height="${totalH + 4}"
            style="position:absolute; top:-2px; left:-2px; pointer-events:none; overflow:visible;">
            ${headerBg}
            ${paths}
          </svg>
          ${fileLabel}
          ${cells}
        </div>
      </div>
    `;

    // Scale to fit available space — may need to re-run when slide becomes visible
    const rescale = () => {
      const outer = document.getElementById(outerId);
      const inner = document.getElementById(innerId);
      if (!outer || !inner) return;
      const avail = outer.clientWidth;
      if (avail === 0) return; // slide still hidden, skip
      if (totalW > avail) {
        const scale = avail / totalW;
        inner.style.transform = `scale(${scale})`;
        inner.style.height = `${totalH * scale}px`;
      } else {
        inner.style.transform = '';
        inner.style.height = `${totalH}px`;
      }
    };

    requestAnimationFrame(rescale);

    // Re-measure when the container becomes visible or resizes.
    // ResizeObserver fires when the slide transitions from hidden (0 width)
    // to visible — works regardless of whether reveal.js has loaded yet.
    const ro = new ResizeObserver(() => requestAnimationFrame(rescale));
    ro.observe(document.getElementById(outerId));

    this._rendered = true;
  }
}

customElements.define('cli-csv', CliCsv);


/**
 * <cli-fanout> — Fan-out/fan-in diagram showing parallel subagent delegation.
 *
 * Usage in markdown:
 *   <cli-fanout input="Main agent" output="Results merged">
 *     Subagent: scrape source A
 *     Subagent: scrape source B
 *     Subagent: clean existing data
 *   </cli-fanout>
 *
 *   <cli-fanout input="Main agent" output="Step 3: combine">
 *     Subagent: code chunk 1
 *     Subagent: code chunk 2
 *     Subagent: code chunk 3
 *   </cli-fanout>
 *
 * Attributes:
 *   input       — label for the left (source) box
 *   output      — label for the right (sink) box
 *   input-color — background for input box (default: "#56ABE1")
 *   output-color — background for output box (default: "#2EC4B6")
 *
 * Text content:
 *   One line per parallel task. Each becomes a middle box.
 */
class CliFanout extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['input', 'output', 'input-color', 'output-color'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const tasks = raw.split('\n').map(s => s.trim()).filter(Boolean);
    const inputLabel = this.getAttribute('input') || 'Input';
    const outputLabel = this.getAttribute('output') || 'Output';
    const inputColor = this.getAttribute('input-color') || '#56ABE1';
    const outputColor = this.getAttribute('output-color') || '#2EC4B6';

    // Unique IDs per instance
    const uid = Math.random().toString(36).slice(2, 8);

    // Layout constants
    const boxW = 220;
    const boxH = 80;
    const taskW = 360;
    const taskH = 56;
    const taskGap = 18;
    const arrowGap = 80;

    const n = tasks.length;
    const tasksBlockH = n * taskH + (n - 1) * taskGap;
    const totalH = Math.max(tasksBlockH, boxH) + 40;

    const inputX = 0;
    const inputY = (totalH - boxH) / 2;
    const taskX = boxW + arrowGap;
    const taskStartY = (totalH - tasksBlockH) / 2;
    const outputX = taskX + taskW + arrowGap;
    const outputY = (totalH - boxH) / 2;
    const totalW = outputX + boxW;

    // SVG arrow paths
    const inputCx = inputX + boxW;
    const inputCy = inputY + boxH / 2;
    const outputCx = outputX;
    const outputCy = outputY + boxH / 2;

    let arrows = '';
    for (let i = 0; i < n; i++) {
      const ty = taskStartY + i * (taskH + taskGap) + taskH / 2;

      // Fan-out: curved bezier from input to task
      const cp1 = arrowGap * 0.55;
      arrows += `<path d="M${inputCx},${inputCy} C${inputCx + cp1},${inputCy} ${taskX - cp1},${ty} ${taskX},${ty}"
        fill="none" stroke="#091A31" stroke-width="2.5" marker-end="url(#arr-${uid})"/>`;

      // Fan-in: curved bezier from task to output
      const tx2 = taskX + taskW;
      arrows += `<path d="M${tx2},${ty} C${tx2 + cp1},${ty} ${outputCx - cp1},${outputCy} ${outputCx},${outputCy}"
        fill="none" stroke="#091A31" stroke-width="2.5" marker-end="url(#arr-${uid})"/>`;
    }

    // Task boxes — light blue-pale fill, subtle rounded border
    const taskBoxes = tasks.map((t, i) => {
      const ty = taskStartY + i * (taskH + taskGap);
      return `<div style="position:absolute; left:${taskX}px; top:${ty}px; width:${taskW}px; height:${taskH}px;
        display:flex; align-items:center; justify-content:center;
        background:#EBF6FF; border:2.5px solid #B6DEFF; border-radius:10px;
        font-size:19pt; color:#091A31; text-align:center; padding:0 20px; box-sizing:border-box;">${t}</div>`;
    }).join('\n');

    // Endpoint boxes — solid color, rounded, white monospace text
    const renderBox = (x, y, color, label) => {
      return `<div style="position:absolute; left:${x}px; top:${y}px; width:${boxW}px; height:${boxH}px;
        display:flex; align-items:center; justify-content:center;
        background:${color}; border-radius:12px;
        font-family:'Roboto Mono',monospace; font-weight:600; font-size:21pt;
        color:white; text-align:center; white-space:pre-line; padding:0 20px; box-sizing:border-box;
        box-shadow:0 3px 12px rgba(9,26,49,0.12);">${label}</div>`;
    };

    this.innerHTML = `
      <svg width="0" height="0" style="position:absolute;">
        <defs>
          <marker id="arr-${uid}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#091A31"/>
          </marker>
        </defs>
      </svg>
      <div style="position:relative; width:${totalW}px; height:${totalH}px; margin:1em auto;">
        <svg width="${totalW}" height="${totalH}" style="position:absolute; top:0; left:0; pointer-events:none;">
          ${arrows}
        </svg>
        ${renderBox(inputX, inputY, inputColor, inputLabel)}
        ${taskBoxes}
        ${renderBox(outputX, outputY, outputColor, outputLabel)}
      </div>
    `;

    this._rendered = true;
  }
}

/**
 * <cli-heatmap> — Presence grid with column headers and row labels.
 *
 * Usage in markdown:
 *   <cli-heatmap columns="Define, Find, Get, Verify, Clean, Analyse, Present"
 *                highlight="Get, Clean">
 *     Human only:    ●, ●, ,  ●, ,  ●, ●
 *     AI can help:   ●, ●, ●, ●, ●, ●, ●
 *     AI can do it:  , ,  ●, ,  ●, ,
 *   </cli-heatmap>
 *
 * Attributes:
 *   columns    — comma-separated column header names
 *   highlight  — comma-separated column names to highlight (darker blue header)
 *   row-label-width — CSS width for the row label column (default: "200px")
 *
 * Text content:
 *   One line per row. Format: "Row Label: cell1, cell2, cell3, ..."
 *   Non-empty cells get a dot (●). Empty cells are blank.
 *   Dot color matches the column header color (highlighted or not).
 *
 * Row label colors cycle through the CLI palette:
 *   row 0 → navy (#091A31), row 1 → blue (#56ABE1), row 2 → gold (#D4A843),
 *   row 3 → purple (#6B4C9A), row 4 → cyan (#2EC4B6), then repeats.
 */
class CliHeatmap extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['columns', 'highlight', 'row-label-width'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const columns = (this.getAttribute('columns') || '').split(',').map(s => s.trim()).filter(Boolean);
    const highlightAttr = (this.getAttribute('highlight') || '').toLowerCase();
    const highlighted = new Set(highlightAttr.split(',').map(s => s.trim().toLowerCase()).filter(Boolean));
    const labelWidth = this.getAttribute('row-label-width') || '200px';

    // Parse rows from text content
    const rows = raw.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
      const colonIdx = line.indexOf(':');
      if (colonIdx < 0) return null;
      const label = line.substring(0, colonIdx).trim();
      const cells = line.substring(colonIdx + 1).split(',').map(c => c.trim());
      return { label, cells };
    }).filter(Boolean);

    const rowLabelColors = ['#091A31', '#56ABE1', '#D4A843', '#6B4C9A', '#2EC4B6'];
    const gap = '4px';

    // Column headers with downward caret
    const headers = columns.map(name => {
      const isHL = highlighted.has(name.toLowerCase());
      const bg = isHL ? '#56ABE1' : '#B6DEFF';
      const color = isHL ? 'white' : '#091A31';
      return `<div style="flex:1; display:flex; flex-direction:column; align-items:center;">
        <div style="background:${bg}; color:${color}; font-weight:600; font-size:24pt; padding:18px 0; width:100%; text-align:center; border-radius:6px 6px 0 0;">${name}</div>
        <div style="width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:14px solid ${bg};"></div>
      </div>`;
    }).join('\n');

    // Data rows
    const dataRows = rows.map((row, ri) => {
      const bgColor = rowLabelColors[ri % rowLabelColors.length];
      const isFirst = ri === 0;
      const isLast = ri === rows.length - 1;
      const labelRadius = isFirst ? 'border-radius:6px 0 0 0;' : isLast ? 'border-radius:0 0 0 6px;' : '';

      const cellsHtml = columns.map((col, ci) => {
        const val = (row.cells[ci] || '').trim();
        const isHL = highlighted.has(col.toLowerCase());
        const dotColor = isHL ? '#56ABE1' : '#091A31';
        const dot = val ? `<span style="color:${dotColor};">●</span>` : '';
        return `<div style="flex:1; background:#EBF6FF; padding:40px 0; text-align:center; font-size:28pt;">${dot}</div>`;
      }).join('\n');

      return `<div style="display:flex; gap:${gap}; margin-top:${gap};">
        <div style="flex:0 0 ${labelWidth}; background:${bgColor}; color:white; font-weight:600; font-size:24pt; display:flex; align-items:center; padding:0 24px; ${labelRadius}">${row.label}</div>
        ${cellsHtml}
      </div>`;
    }).join('\n');

    this.innerHTML = `
      <div style="width:92%; margin:1.2em auto 1.6em;">
        <div style="display:flex; gap:${gap};">
          <div style="flex:0 0 ${labelWidth};"></div>
          ${headers}
        </div>
        ${dataRows}
      </div>
    `;

    this._rendered = true;
  }
}

customElements.define('cli-heatmap', CliHeatmap);

 * <cli-highlight-prompt> — Colour-coded AI prompt with the four-element framework.
 *
 * A specialised version of <cli-highlight> with preset colours for:
 *   {objective}  — what you want to achieve (soft red)
 *   {steps}      — what to do, in what order (soft blue)
 *   {output}     — what the result should look like (soft teal)

 * Usage in markdown:

 *     It should have: {output}a title, datasets with metadata, and navigation.{/output}

 *     {reasoning}Explain how you chose to present the information.{/reasoning}
 *   </cli-highlight-prompt>
 *
 * Attributes:
 *   no-legend — if present, hides the legend below the prompt
 *
 * Inherits all rendering from <cli-highlight>.
 */
class CliHighlightPrompt extends HTMLElement {
  connectedCallback() {
    // Set the preset colours if not already defined
    if (!this.getAttribute('colors')) {
      this.setAttribute('colors',
        'objective:Objective:#DC6464 | steps:Steps:#64A0DC | output:Output shape:#64BEB4 | reasoning:Reasoning:#DCB964'
      );
    }

    if (this.hasAttribute('no-legend')) highlight.setAttribute('no-legend', '');
    if (this.hasAttribute('no-quotes')) highlight.setAttribute('no-quotes', '');
    highlight.textContent = this.textContent;
    this.textContent = '';
    this.appendChild(highlight);

/**
 * <cli-highlight> — Generic text with colour-coded inline highlights and optional legend.
 *
 * Wraps text sections in pastel-coloured spans using curly-brace tags.
 * Colours and legend labels are defined via the `colors` attribute as
 * a pipe-separated list of "tag:label:#hex" entries.
 *
 * Usage in markdown:
 *   <cli-highlight colors="pro:Advantage:#4CAF50 | con:Disadvantage:#F44336 | note:Note:#FF9800">
 *     This tool has {pro}excellent performance{/pro} but {con}limited documentation{/con}.
 *     {note}A community guide exists.{/note}
 *   </cli-highlight>
 *
 * Attributes:
 *   colors    — pipe-separated definitions: "tag:Label:#hex | tag:Label:#hex"
 *               The hex colour is used at 0.3 opacity for highlights.
 *   no-legend — if present, hides the legend below the text
 *   no-quotes — if present, omits the guillemets around the text
 */
class CliHighlight extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  _render() {
    this._rendered = true;

    const colorDefs = (this.getAttribute('colors') || '').split('|').map(s => s.trim()).filter(Boolean);
    const tags = {};

    for (const def of colorDefs) {
      const parts = def.split(':').map(s => s.trim());
      if (parts.length >= 3) {
        const [tag, label, hex] = parts;
        // Convert hex to rgba at 0.3 opacity
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        tags[tag] = { label, color: `rgba(${r},${g},${b},0.3)` };
      }
    }

    let raw = this.textContent.trim();
    let html = raw;

    for (const [tag, { color }] of Object.entries(tags)) {
      const openRe = new RegExp(`\\{${tag}\\}`, 'g');
      const closeRe = new RegExp(`\\{/${tag}\\}`, 'g');
      html = html.replace(openRe, `<span style="background:${color}; padding:4px 10px; border-radius:4px;">`);
      html = html.replace(closeRe, '</span>');
    }

    html = html.replace(/\s+/g, ' ').trim();

    const showLegend = !this.hasAttribute('no-legend');
    const showQuotes = !this.hasAttribute('no-quotes');

    const prefix = showQuotes ? '\u00AB\u00A0' : '';
    const suffix = showQuotes ? '\u00A0\u00BB' : '';

    let legendHtml = '';
    if (showLegend && Object.keys(tags).length > 0) {
      const items = Object.values(tags).map(({ label, color }) =>
        `<span style="background:${color}; padding:4px 10px; border-radius:4px; font-size:0.7em;">${label}</span>`
      ).join(' ');
      legendHtml = `<div style="margin-top:12px; display:flex; gap:24px; justify-content:center;">${items}</div>`;
    }

    this.innerHTML = `
      <div style="background:#f5f5f5; padding:30px 40px; border-radius:12px; font-size:0.85em; margin:20px 0;">
        <p style="line-height:2.2 !important; margin:0;">${prefix}${html}${suffix}</p>
      </div>
      ${legendHtml}
    `;
  }
}

customElements.define('cli-highlight', CliHighlight);


/**
 * <cli-pipeline> — Custom element for data pipeline chevron diagrams.
 *
 * Usage in markdown:
 *   <cli-pipeline highlight="Get">Define, Find, Get, Verify, Clean, Analyse, Present</cli-pipeline>
 *   <cli-pipeline highlight="Clean, Present">Define, Find, Get, Verify, Clean, Analyse, Present</cli-pipeline>
 *   <cli-pipeline>Define, Find, Get, Verify, Clean</cli-pipeline>
 *
 * Attributes:
 *   highlight  — comma-separated step names to highlight (darker blue, white text)
 *   caption    — per-step annotations, pipe-separated. Format:
 *                "StepName: annotation text | StepName: annotation text"
 *                If no step prefix, annotation is placed under the highlighted group.
 *                Text wraps naturally. A vertical line connects each annotation to its step.
 *
 * Examples:
 *   caption="Get: Manual PDF parsing replaced by LLM extraction"
 *   caption="Clean: AI summarises transcripts | Present: Generates email digests"
 *   caption="Both steps use constrained AI"   (no prefix — centered under highlights)
 */
class CliPipeline extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['highlight', 'caption'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  disconnectedCallback() {
    if (this._observer) { this._observer.disconnect(); this._observer = null; }
  }

  _render() {
    const raw = this.textContent.trim();
    if (!raw) return;

    const steps = raw.split(',').map(s => s.trim()).filter(Boolean);
    const highlightAttr = (this.getAttribute('highlight') || '').toLowerCase();
    const highlighted = new Set(
      highlightAttr.split(',').map(s => s.trim().toLowerCase()).filter(Boolean)
    );
    const captionAttr = this.getAttribute('caption') || '';

    // Clip-path polygons
    const firstClip = 'polygon(0 0,calc(100% - 20px) 0,100% 50%,calc(100% - 20px) 100%,0 100%)';
    const restClip = 'polygon(0 0,calc(100% - 20px) 0,100% 50%,calc(100% - 20px) 100%,0 100%,20px 50%)';

    const highlightedIndices = [];

    const blocks = steps.map((name, i) => {
      const isHighlighted = highlighted.has(name.toLowerCase());
      if (isHighlighted) highlightedIndices.push(i);
      const clip = i === 0 ? firstClip : restClip;
      const bg = isHighlighted ? '#56ABE1' : '#B6DEFF';
      const color = isHighlighted ? 'white' : '#091A31';
      const weight = isHighlighted ? '700' : '600';
      const size = isHighlighted ? '22pt' : '20pt';
      const padLeft = i === 0 ? '32px' : '44px';

      return `<div style="background:${bg}; clip-path:${clip}; padding:24px 48px 24px ${padLeft}; text-align:center; font-family:'Roboto Mono',monospace; font-weight:${weight}; font-size:${size}; color:${color}; white-space:nowrap;">${name}</div>`;
    }).join('\n');

    this.innerHTML = `
      <div style="position:relative; margin:1.5em 0;">
        <div class="cli-pipeline-row" style="display:flex; align-items:center; justify-content:center; gap:6px;">
          ${blocks}
        </div>
      </div>
    `;

    // Parse and position captions after layout
    const captions = this._parseCaptions(captionAttr);
    if (captions.length > 0) {
      requestAnimationFrame(() => this._positionCaptions(captions, steps, highlightedIndices));
    }

    this._rendered = true;
  }

  _parseCaptions(attr) {
    if (!attr) return [];
    return attr.split('|').map(part => {
      part = part.trim();
      const colonIdx = part.indexOf(':');
      if (colonIdx > 0) {
        const step = part.substring(0, colonIdx).trim();
        const text = part.substring(colonIdx + 1).trim();
        return { step: step.toLowerCase(), text };
      }
      // No prefix — will be placed under the highlighted group
      return { step: null, text: part };
    }).filter(c => c.text);
  }

  _positionCaptions(captions, steps, highlightedIndices) {
    const row = this.querySelector('.cli-pipeline-row');
    if (!row) return;

    const blocks = row.children;
    const rowRect = row.getBoundingClientRect();

    // If the slide is not visible yet (reveal.js hides inactive slides),
    // getBoundingClientRect() returns zeros. Defer until visible.
    if (rowRect.width === 0) {
      if (this._observer) this._observer.disconnect();
      this._observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          this._observer.disconnect();
          this._observer = null;
          this._positionCaptions(captions, steps, highlightedIndices);
        }
      });
      this._observer.observe(this);
      return;
    }

    const container = row.parentElement;
    container.style.overflow = 'visible';

    // Remove any previously positioned caption/line elements
    container.querySelectorAll('.cli-caption, .cli-caption-line').forEach(el => el.remove());

    // reveal.js scales slides via CSS transform. getBoundingClientRect()
    // returns screen pixels (post-scale), but absolute positioning uses
    // the container's local CSS pixels (pre-scale). Compute the ratio.
    const scale = rowRect.width / row.offsetWidth;

    // First pass: resolve each caption's anchor X in local CSS pixels
    const resolved = [];
    for (const caption of captions) {
      let anchorX;
      if (caption.step) {
        const stepIdx = steps.findIndex(s => s.toLowerCase() === caption.step);
        if (stepIdx < 0) continue;
        const blockRect = blocks[stepIdx].getBoundingClientRect();
        anchorX = ((blockRect.left + blockRect.right) / 2 - rowRect.left) / scale;
      } else {
        if (highlightedIndices.length === 0) continue;
        const firstRect = blocks[highlightedIndices[0]].getBoundingClientRect();
        const lastRect = blocks[highlightedIndices[highlightedIndices.length - 1]].getBoundingClientRect();
        anchorX = ((firstRect.left + lastRect.right) / 2 - rowRect.left) / scale;
      }
      resolved.push({ ...caption, anchorX });
    }

    // Sort by position so we can calculate available width between captions
    resolved.sort((a, b) => a.anchorX - b.anchorX);

    // Wrapping rule: each caption's max-width is ~2 step-widths,
    // capped by the space before the next caption so they never overlap.
    // This keeps wrapping consistent whether there's 1 caption or 5.
    const rowWidth = row.offsetWidth;
    const stepWidth = rowWidth / steps.length;
    const naturalWidth = stepWidth;

    const lineW = 3;

    for (let i = 0; i < resolved.length; i++) {
      const { anchorX, text } = resolved[i];

      const nextAnchorX = i < resolved.length - 1 ? resolved[i + 1].anchorX : rowWidth;
      const maxWidth = Math.min(naturalWidth, nextAnchorX - anchorX - 24);

      // Left edge aligned: both the vertical line and the caption border-left
      // start at the same x so there's no visual break
      const lineLeft = anchorX - lineW / 2;

      // Vertical connector line — starts 2px inside the chevron so there's
      // no visible gap between the block and the line
      const line = document.createElement('div');
      line.className = 'cli-caption-line';
      line.style.cssText = `position:absolute; left:${lineLeft}px; top:calc(100% - 2px); width:${lineW}px; height:26px; background:#56ABE1;`;
      container.appendChild(line);

      // Caption text with left border continuing the line seamlessly
      const captionEl = document.createElement('div');
      captionEl.className = 'cli-caption';
      captionEl.style.cssText = `position:absolute; left:${lineLeft}px; top:calc(100% + 24px); box-sizing:border-box; border-left:${lineW}px solid #56ABE1; padding:2px 0 2px 14px; font-size:18pt; color:#888; max-width:${maxWidth}px; line-height:1.4;`;
      captionEl.textContent = text;
      container.appendChild(captionEl);
    }

    // After layout, measure actual caption heights and reserve generous
    // margin so subsequent content has clear separation from captions
    requestAnimationFrame(() => {
      const containerRect = container.getBoundingClientRect();
      let maxBottom = 0;
      container.querySelectorAll('.cli-caption').forEach(el => {
        const r = el.getBoundingClientRect();
        const bottom = r.bottom - containerRect.top;
        if (bottom > maxBottom) maxBottom = bottom;
      });
      container.style.marginBottom = `${maxBottom - containerRect.height + 72}px`;
    });

    // Default margin before measurement completes
    container.style.marginBottom = '120px';
  }
}

customElements.define('cli-pipeline', CliPipeline);


/**
 * <cli-quadrant> — 2×2 quadrant diagram with labeled axes.
 *
 * Usage in markdown:
 *   <cli-quadrant x-label="Representation" y-label="Structure"
 *     tl="Erroneous data | hallucination | #D4A843"
 *     tr="Good data || #2EC4B6"
 *     bl="Useless data || #CC0000"
 *     br="Messy data || #6B4C9A">
 *   </cli-quadrant>
 *
 * Attributes:
 *   x-label  — label for the horizontal axis (right arrow)
 *   y-label  — label for the vertical axis (up arrow)
 *   tl       — top-left quadrant: "Title | Subtitle | Color"
 *   tr       — top-right quadrant: "Title | Subtitle | Color"
 *   bl       — bottom-left quadrant: "Title | Subtitle | Color"
 *   br       — bottom-right quadrant: "Title | Subtitle | Color"
 *   size     — overall size in px (default: "540")
 *
 * Each quadrant value is pipe-separated: "Title | Subtitle | #hexcolor"
 * Subtitle and color are optional. Default color is #56ABE1.
 */
class CliQuadrant extends HTMLElement {
  connectedCallback() {
    requestAnimationFrame(() => this._render());
  }

  static get observedAttributes() {
    return ['x-label', 'y-label', 'tl', 'tr', 'bl', 'br', 'size'];
  }

  attributeChangedCallback() {
    if (this._rendered) this._render();
  }

  _parseQuadrant(attr) {
    if (!attr) return null;
    const parts = attr.split('|').map(s => s.trim());
    return {
      title: parts[0] || '',
      subtitle: parts[1] || '',
      color: parts[2] || '#56ABE1'
    };
  }

  _render() {
    const xLabel = this.getAttribute('x-label') || '';
    const yLabel = this.getAttribute('y-label') || '';
    const size = parseInt(this.getAttribute('size') || '540', 10);

    const quadrants = {
      tl: this._parseQuadrant(this.getAttribute('tl')),
      tr: this._parseQuadrant(this.getAttribute('tr')),
      bl: this._parseQuadrant(this.getAttribute('bl')),
      br: this._parseQuadrant(this.getAttribute('br'))
    };

    // Symmetric layout from axis crossing point
    const gap = 36;          // breathing room between boxes and axis
    const pad = 10;          // outer padding around quadrant area
    const arrowExt = 20;     // how far arrows extend past boxes
    const topMar = 36;       // space above boxes for arrow + label

    // Axis crossing point — center of the box area (topMar to size-pad)
    const crossX = size / 2;
    const crossY = topMar + (size - pad - topMar) / 2;

    // Quadrant box dimensions
    const qW = crossX - pad - gap / 2;
    const qH = (size - pad - topMar - gap) / 2;

    // Diagonal stripes: semi-transparent color alternating with white
    const stripes = (color) => {
      return `repeating-linear-gradient(45deg, ${color}99 0px, ${color}99 10px, white 10px, white 20px)`;
    };

    // Unique filter ID per instance to avoid collisions
    const filterId = `wobble-${Math.random().toString(36).slice(2, 8)}`;

    const renderQ = (q, top, left) => {
      if (!q) return '';
      const subtitle = q.subtitle ? `<div style="color:#091A31; font-size:14pt; margin-top:2px; font-style:italic;">${q.subtitle}</div>` : '';
      return `<div style="position:absolute; left:${left}px; top:${top}px; width:${qW}px; height:${qH}px; display:flex; align-items:center; justify-content:center; flex-direction:column; box-sizing:border-box;">
        <div style="position:absolute; inset:-6px; background:${stripes(q.color)}; filter:url(#${filterId});"></div>
        <div style="position:relative; background:rgba(255,255,255,0.85); padding:8px 16px; border-radius:6px; text-align:center;">
          <div style="color:#091A31; font-weight:700; font-size:18pt; line-height:1.3;">${q.title}</div>
          ${subtitle}
        </div>
      </div>`;
    };

    // Quadrant positions
    const tlLeft = pad;
    const tlTop = topMar;
    const trLeft = crossX + gap / 2;
    const trTop = topMar;
    const blLeft = pad;
    const blTop = crossY + gap / 2;
    const brLeft = crossX + gap / 2;
    const brTop = crossY + gap / 2;

    // Total dimensions
    const totalW = size + arrowExt + 14;
    const totalH = size + 36;

    this.innerHTML = `
      <svg width="0" height="0" style="position:absolute;">
        <filter id="${filterId}">
          <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2" result="turbulence"/>
          <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="10" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </svg>
      <div style="position:relative; width:${totalW}px; height:${totalH}px; overflow:visible;">
        <!-- Y axis -->
        <div style="position:absolute; left:${crossX}px; top:6px; height:${size - 6}px; width:3px; background:#091A31;"></div>
        <!-- X axis -->
        <div style="position:absolute; top:${crossY}px; left:0; width:${size + arrowExt}px; height:3px; background:#091A31;"></div>
        <!-- Y arrow -->
        <div style="position:absolute; left:${crossX - 7}px; top:-2px; width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; border-bottom:14px solid #091A31;"></div>
        <!-- X arrow -->
        <div style="position:absolute; left:${size + arrowExt}px; top:${crossY - 7}px; width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-left:14px solid #091A31;"></div>
        <!-- Y label -->
        <div style="position:absolute; left:${crossX + 16}px; top:0; font-family:var(--font-title); font-size:17pt; font-weight:600; color:#56ABE1; white-space:nowrap;">${yLabel}</div>
        <!-- X label -->
        <div style="position:absolute; right:0; top:${size + 8}px; font-family:var(--font-title); font-size:17pt; font-weight:600; color:#56ABE1; white-space:nowrap;">${xLabel}</div>
        <!-- Quadrants -->
        ${renderQ(quadrants.tl, tlTop, tlLeft)}
        ${renderQ(quadrants.tr, trTop, trLeft)}
        ${renderQ(quadrants.bl, blTop, blLeft)}
        ${renderQ(quadrants.br, brTop, brLeft)}
      </div>
    `;

    this._rendered = true;
  }
}

customElements.define('cli-quadrant', CliQuadrant);

</script>

<script>
  Reveal.initialize({
    width: 1920,
    height: 1080,
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0,
    center: false,
    display: 'flex',
    hash: true,
    transition: 'fade',
    transitionSpeed: 'fast',
    pdfSeparateFragments: false,
    plugins: [RevealMarkdown, RevealNotes, RevealHighlight]
  });

  // Post-processor: add content-slide class to slides without an explicit type
  Reveal.on('ready', () => {
    const typeClasses = ['title-slide', 'section-slide', 'subsection-slide', 'toc-slide'];
    document.querySelectorAll('.slides > section > section, .slides > section[data-markdown-parsed]').forEach(section => {
      if (!typeClasses.some(c => section.classList.contains(c))) {
        section.classList.add('content-slide');
      }
    });
    updateFooter();
  });

  // Footer visibility and slide number
  const globalFooter = document.querySelector('.global-footer');
  const slideNumberEl = document.querySelector('.global-footer .page-number');
  const darkClasses = ['title-slide', 'section-slide', 'subsection-slide'];

  // Hide footer entirely in speaker view iframes (prevents overlap in preview)
  if (new URLSearchParams(window.location.search).has('receiver')) {
    if (globalFooter) globalFooter.style.display = 'none';
  }

  function updateFooter() {
    if (!globalFooter) return;
    const slide = Reveal.getCurrentSlide();
    const isDark = darkClasses.some(c => slide.classList.contains(c));
    globalFooter.classList.toggle('hidden', isDark);
    slideNumberEl.textContent = Reveal.getSlidePastCount() + 1;
  }

  Reveal.on('slidechanged', updateFooter);
</script>

</body>
</html>
